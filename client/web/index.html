<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lan House Manager - Cliente</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="screen">
      <section class="card">
        <p class="eyebrow">Cliente</p>
        <h1>Painel da sessão</h1>
        <p class="muted">Versão web do cliente para exibir tempo, recados do admin e pedidos de login/tempo.</p>
        <div class="timer">45:00</div>
        <div class="actions">
          <button>Pedir login</button>
          <button>Pedir mais tempo</button>
          <button>Ocultar tempo</button>
        </div>
        <div class="notice">Bem-vindo, usuário. Restam 45 minutos na sua sessão.</div>
      </section>
    </main>
  </body>
</html>
